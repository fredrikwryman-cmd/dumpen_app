<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 300" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a2332;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#0f1923;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1a2332;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="pikeBody" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4a7c59;stop-opacity:0.9" />
      <stop offset="50%" style="stop-color:#6b9b7a;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#3d6b4a;stop-opacity:0.9" />
    </linearGradient>
    <linearGradient id="pikeBelly" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e8d5a3;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#c4b08a;stop-opacity:0.5" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="300" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05">
    <line x1="0" y1="60" x2="1200" y2="60" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="120" x2="1200" y2="120" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="180" x2="1200" y2="180" stroke="#fff" stroke-width="0.5"/>
    <line x1="0" y1="240" x2="1200" y2="240" stroke="#fff" stroke-width="0.5"/>
    <line x1="200" y1="0" x2="200" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="400" y1="0" x2="400" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="600" y1="0" x2="600" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="800" y1="0" x2="800" y2="300" stroke="#fff" stroke-width="0.5"/>
    <line x1="1000" y1="0" x2="1000" y2="300" stroke="#fff" stroke-width="0.5"/>
  </g>

  <!-- Pike fish 1 - large, left side -->
  <g transform="translate(120, 150) rotate(-8)" filter="url(#glow)">
    <!-- Body -->
    <ellipse cx="0" cy="0" rx="160" ry="35" fill="url(#pikeBody)"/>
    <!-- Belly -->
    <ellipse cx="10" cy="8" rx="120" ry="18" fill="url(#pikeBelly)"/>
    <!-- Dorsal fin -->
    <polygon points="-60,-35 -30,-70 0,-65 20,-35" fill="#4a7c59" opacity="0.8"/>
    <!-- Tail fin -->
    <polygon points="155,-25 200,-45 190,0 200,45 155,25" fill="#3d6b4a" opacity="0.9"/>
    <!-- Pectoral fin -->
    <polygon points="40,20 70,55 20,45 10,25" fill="#5a8c69" opacity="0.7"/>
    <!-- Eye -->
    <circle cx="-100" cy="-5" r="8" fill="#1a1a1a"/>
    <circle cx="-102" cy="-7" r="3" fill="#fff" opacity="0.8"/>
    <!-- Mouth -->
    <path d="M-155,0 Q-165,5 -160,12" stroke="#2d4a35" stroke-width="2" fill="none"/>
    <!-- Spots -->
    <circle cx="-40" cy="-12" r="4" fill="#8ab89a" opacity="0.5"/>
    <circle cx="-10" cy="-15" r="3" fill="#8ab89a" opacity="0.5"/>
    <circle cx="20" cy="-10" r="4" fill="#8ab89a" opacity="0.5"/>
    <circle cx="50" cy="-14" r="3" fill="#8ab89a" opacity="0.5"/>
    <circle cx="80" cy="-8" r="4" fill="#8ab89a" opacity="0.5"/>
    <circle cx="-60" cy="5" r="3" fill="#8ab89a" opacity="0.4"/>
    <circle cx="0" cy="8" r="3" fill="#8ab89a" opacity="0.4"/>
    <circle cx="40" cy="5" r="3" fill="#8ab89a" opacity="0.4"/>
  </g>

  <!-- Pike fish 2 - medium, right side -->
  <g transform="translate(850, 100) rotate(5)" filter="url(#glow)">
    <ellipse cx="0" cy="0" rx="130" ry="28" fill="url(#pikeBody)"/>
    <ellipse cx="5" cy="6" rx="95" ry="14" fill="url(#pikeBelly)"/>
    <polygon points="-50,-28 -25,-55 0,-50 15,-28" fill="#4a7c59" opacity="0.8"/>
    <polygon points="125,-20 165,-38 155,0 165,38 125,20" fill="#3d6b4a" opacity="0.9"/>
    <polygon points="30,15 55,42 15,35 5,18" fill="#5a8c69" opacity="0.7"/>
    <circle cx="-80" cy="-4" r="7" fill="#1a1a1a"/>
    <circle cx="-82" cy="-6" r="2.5" fill="#fff" opacity="0.8"/>
    <path d="M-125,0 Q-133,4 -130,10" stroke="#2d4a35" stroke-width="1.5" fill="none"/>
    <circle cx="-35" cy="-10" r="3" fill="#8ab89a" opacity="0.5"/>
    <circle cx="-5" cy="-12" r="2.5" fill="#8ab89a" opacity="0.5"/>
    <circle cx="25" cy="-8" r="3" fill="#8ab89a" opacity="0.5"/>
    <circle cx="55" cy="-11" r="2.5" fill="#8ab89a" opacity="0.5"/>
  </g>

  <!-- Pike fish 3 - small, bottom right -->
  <g transform="translate(950, 220) rotate(-12)" opacity="0.6">
    <ellipse cx="0" cy="0" rx="90" ry="20" fill="url(#pikeBody)"/>
    <ellipse cx="3" cy="4" rx="65" ry="10" fill="url(#pikeBelly)"/>
    <polygon points="-35,-20 -15,-38 0,-34 10,-20" fill="#4a7c59" opacity="0.8"/>
    <polygon points="85,-14 115,-27 108,0 115,27 85,14" fill="#3d6b4a" opacity="0.9"/>
    <circle cx="-55" cy="-3" r="5" fill="#1a1a1a"/>
    <circle cx="-56.5" cy="-4.5" r="2" fill="#fff" opacity="0.8"/>
    <path d="M-85,0 Q-91,3 -88,7" stroke="#2d4a35" stroke-width="1.2" fill="none"/>
  </g>

  <!-- Water ripples -->
  <g opacity="0.08" stroke="#fff" fill="none" stroke-width="1">
    <ellipse cx="300" cy="200" rx="150" ry="20"/>
    <ellipse cx="300" cy="200" rx="200" ry="28"/>
    <ellipse cx="300" cy="200" rx="250" ry="35"/>
    <ellipse cx="700" cy="80" rx="100" ry="15"/>
    <ellipse cx="700" cy="80" rx="140" ry="22"/>
  </g>

  <!-- Subtle light rays -->
  <g opacity="0.04">
    <polygon points="600,0 400,300 500,300" fill="#ffcc00"/>
    <polygon points="600,0 700,300 800,300" fill="#ffcc00"/>
  </g>
</svg>
